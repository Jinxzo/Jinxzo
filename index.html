<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UI Mockup Generator</title>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<style>
:root{--theme:#8f3dff;--bg:#0b0b0b}
*{box-sizing:border-box;font-family:Arial,sans-serif}
body{margin:0;background:#111;color:#fff;display:flex;gap:20px;padding:20px;flex-wrap:wrap}
.panel{width:360px;background:#1a1a1a;padding:15px;border-radius:16px}
input,textarea,select,button{width:100%;margin-top:6px;margin-bottom:10px;padding:10px;border-radius:10px;border:none}
button{cursor:pointer}
.previewWrap{flex:1;display:flex;justify-content:center}
#card{width:450px;background:var(--bg);border:2px solid var(--theme);border-radius:24px;padding:20px;box-shadow:0 0 25px var(--theme)}
.logo{font-size:34px;font-weight:bold;color:var(--theme)}
.section{margin-top:20px;border:1px solid #333;border-radius:14px;overflow:hidden}
.sectionTitle{padding:12px;background:#171717;color:var(--theme);font-weight:bold}
.desc{padding:10px;font-size:12px;opacity:.8}
.row{display:flex;justify-content:space-between;padding:12px;border-top:1px solid #222}
.toggle{padding:6px 12px;border-radius:20px;font-weight:bold}
.feature{display:flex;gap:6px}
.feature input{flex:1}
.feature select{width:90px}
</style>
</head>
<body>
<div class="panel">
<h2>Generator</h2>
<input id="title" value="FreeLock V1.0" placeholder="Nama">
<input id="used" value="Free" placeholder="Used">
<label>Warna Tema</label><input type="color" id="theme" value="#8f3dff">
<label>Background</label><input type="color" id="bg" value="#0b0b0b">

<input id="aimTitle" value="AIM VIP">
<textarea id="aimDesc">Premium Features</textarea>
<div id="aimFeatures"></div>
<button onclick="addFeature('aimFeatures')">+ AIM Feature</button>

<input id="espTitle" value="ESP MENU">
<textarea id="espDesc">Visual Features</textarea>
<div id="espFeatures"></div>
<button onclick="addFeature('espFeatures')">+ ESP Feature</button>

<button onclick="renderCard()">Generate</button>
<button onclick="downloadPNG()">Download PNG</button>
</div>

<div class="previewWrap">
<div id="card"></div>
</div>

<script>
function addFeature(id,name='',status='ON'){
 let d=document.createElement('div');
 d.className='feature';
 d.innerHTML=`<input value="${name}" placeholder="Feature"><select><option>ON</option><option>OFF</option></select>`;
 d.querySelector('select').value=status;
 document.getElementById(id).appendChild(d);
}
['AIM BOT','AIM FIRE','AIM SILENT'].forEach(v=>addFeature('aimFeatures',v,'ON'));
['ESP','ESP NAME','ESP LINE'].forEach(v=>addFeature('espFeatures',v,'ON'));

function row(name,status){
 let bg=status==='ON'?'var(--theme)':'#444';
 return `<div class="row"><span>${name}</span><div class="toggle" style="background:${bg}">${status}</div></div>`;
}

function renderCard(){
 document.documentElement.style.setProperty('--theme',theme.value);
 document.documentElement.style.setProperty('--bg',bg.value);

 let aim='';
 document.querySelectorAll('#aimFeatures .feature').forEach(f=>{
  let n=f.querySelector('input').value;
  let s=f.querySelector('select').value;
  if(n.trim()) aim+=row(n,s);
 });

 let esp='';
 document.querySelectorAll('#espFeatures .feature').forEach(f=>{
  let n=f.querySelector('input').value;
  let s=f.querySelector('select').value;
  if(n.trim()) esp+=row(n,s);
 });

 card.innerHTML=`
 <div class="logo">${title.value}</div>
 <div>used : ${used.value}</div>

 <div class="section">
  <div class="sectionTitle">${aimTitle.value}</div>
  <div class="desc">${aimDesc.value.replace(/\n/g,'<br>')}</div>
  ${aim}
 </div>

 <div class="section">
  <div class="sectionTitle">${espTitle.value}</div>
  <div class="desc">${espDesc.value.replace(/\n/g,'<br>')}</div>
  ${esp}
 </div>`;
}

function downloadPNG(){
 html2canvas(document.getElementById('card'),{scale:3}).then(c=>{
  let a=document.createElement('a');
  a.href=c.toDataURL('image/png');
  a.download='mockup.png';
  a.click();
 });
}
renderCard();
</script>
</body>
</html>
